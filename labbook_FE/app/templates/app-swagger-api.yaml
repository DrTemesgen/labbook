openapi: 3.0.1
info:
  title: LabBook API
  description: 'This is a description of LabBook web services.'
  contact:
    email: labbook@fondation-merieux.org
  license:
    name: GPL-2.0
    url: https://github.com/fondationmerieux/labbook_python/blob/master/LICENSE.md
  version: 3.5.6
externalDocs:
  description: Find out more about Swagger
  url: http://swagger.io
servers:
- url: {{ request.url_root }}/services
tags:
- name: analysis
  description: web services about analysis
- name: patient
  description: web services about patients
- name: record
  description: web services about records
- name: result
  description: web services about results
- name: user
  description: web services about users
paths:
  /external/analysis/code/check/{code}:
    get:
      security: [ { OAuth2: [ external/analysis ] } ]
      tags:
      - analysis
      summary: Checks if the analysis code doesn't already exist in DB
      description: 
      operationId: AnalysisCode
      parameters:
      - name: code
        in: path
        description: unique analysis code
        required: true
        schema:
          type: string
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: integer
  /external/analysis/det/{id_ana}:
    get:
      security: [ { OAuth2: [ external/analysis ] } ]
      tags:
      - analysis
      summary: Analysis details
      description: Return the details of a specific analysis.
      operationId: AnalysisDet
      parameters:
      - name: id_ana
        in: path
        description: Serial of an analysis
        required: true
        schema:
          type: integer
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Analysis'
        404:
          description: Not found
  /external/analysis/list:
    post:
      security: [ { OAuth2: [ external/analysis ] } ]
      tags:
      - analysis
      summary: List of analysis
      operationId: AnalysisList
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status: 
                  type: string
                  description: |
                    Status of the analysis \
                    A = Active \
                    I = Inactive
                  enum: [A, I]
                  default: "A"
                name: 
                  type: string
                  default: ""
                type_ana:
                  type: integer
                type_prod:
                  type: integer
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Analysis'
  /external/record/det/0:
    post:
      security: [ { OAuth2: [ external/record ] } ]
      tags:
      - record
      summary: Create a new record
      operationId: RecordFromExt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                record:
                  type: object
                  required: [rec_type, rec_date, rec_date_prescr]
                  properties:
                    rec_type:
                      type: string
                      description: |
                        type of record \
                        E = External \
                        I = Internal
                      enum:
                      - E
                      - I
                      default: E
                    rec_date:
                      type: string
                      format: date-time
                      description: datetime of receipt, (format YYYY-MM-DD HH:MM:SS)
                    rec_date_prescr:
                      type: string
                      format: date
                      description: date of prescription, (format YYYY-MM-DD)
                    rec_num_int:
                      type: string
                      description: internal laboratory record number
                      default: ""
                    rec_custody:
                      type: string
                      description: request for custody, Yes / No
                      enum:
                      - Y
                      - N
                      default: N
                    rec_comm:
                      type: string
                      description: comments on the record
                      default: ""
                    rec_parcel_id:
                      type: string
                      description: parcel identifier
                      default: ""
                    rec_parcel_date:
                      allOf:
                        - $ref: '#/components/schemas/DateTimeOrEmpty'
                      description: datetime of receipt of parcel, (format YYYY-MM-DD HH:MM:SS)
                    rec_invoice_discount:
                      type: string
                      description: |
                        discount on invoicing \
                        S = Staff \
                        E = Exemption \
                        O = Other
                      enum:
                      - S
                      - E
                      - O
                      default: ""
                    rec_percent_discount:
                      type: number
                      format: double
                      minimum: 0
                      description: percentage of discount
                      default: 0
                    rec_insurance_cover:
                      type: number
                      format: double
                      minimum: 0
                      description: health insurance coverage
                      default: 0
                    rec_receipt_num:
                      type: string
                      description: invoice receipt number
                      default: ""
                    rec_date_hosp:
                      allOf:
                        - $ref: '#/components/schemas/DateOrEmpty'
                      description: date of admission, (format YYYY-MM-DD)
                    rec_int_service:
                      type: string
                      description: requesting department
                      default: ""
                    rec_bed_num:
                      type: integer
                      description: bed number
                      default: 0
                    rec_hosp_num:
                      type: string
                      description: hospital identification
                      default: ""
                patient:
                  type: object
                  properties:
                    pat_code:
                      type: string
                      description: unique LabBook code, if filled in then a match will be found in the database
                      default: ""
                    pat_code_lab:
                      type: string
                      description: code, if filled in then a match will be found in the database (after pat_code)
                      default: ""
                    pat_anonymous:
                      type: string
                      description: anonymous patient (names and gender will not be recorded), Yes / No
                      enum:
                      - Y
                      - N
                      default: N
                    pat_name:
                      type: string
                      description: patient's name, name + firstname + sex + date of birth or age and age_unit will be used to search for a match.
                      default: ""
                    pat_middle_name:
                      type: string
                      description: patient's middle name
                      default: ""
                    pat_maiden_name:
                      type: string
                      description: patient's maiden name
                      default: ""
                    pat_firstname:
                      type: string
                      description: patient's firstname, name + firstname + sex + date of birth or age and age_unit will be used to search for a match.
                      default: ""
                    pat_sex:
                      type: string
                      description: |
                        patient's gender \
                        M = Male \
                        F = Female \
                        U = Unknown
                      enum:
                      - M
                      - F
                      - U
                      default: "U"
                    pat_birth:
                      allOf:
                        - $ref: '#/components/schemas/DateOrEmpty'
                      description: patient's date of birth (format YYYY-MM-DD), name + firstname + sex + date of birth or age and age_unit will be used to search for a match.
                    pat_date_approx:
                      type: string
                      description: approximate date of birth, Yes / No
                      enum:
                      - Y
                      - N
                      default: N
                    pat_age:
                      type: integer
                      description: patient's age, name + firstname + sex + date of birth or age and age_unit will be used to search for a match.
                      default: 0
                    pat_age_unit:
                      type: string
                      description: |
                        unit patient's age \
                        D = Day \
                        W = Week \
                        M = Month \
                        Y = Year
                      enum:
                      - D
                      - W
                      - M
                      - Y
                      default: Y
                    pat_address:
                      type: string
                      description: patient's address
                      default: ""
                    pat_pbox:
                      type: string
                      description: patient's P.O. box
                      default: ""
                    pat_area:
                      type: string
                      description: patient's area
                      default: ""
                    pat_zipcode:
                      type: string
                      description: patient's zipcode
                      default: ""
                    pat_city:
                      type: string
                      description: patient's city
                      default: ""
                    pat_phone1:
                      type: string
                      description: patient's phone 1
                      default: ""
                    pat_phone2:
                      type: string
                      description: patient's phone 2
                      default: ""
                    pat_job:
                      type: string
                      description: patient's job
                      default: ""
                    pat_nationality:
                      type: string
                      description: patient's nationality code
                      default: ""
                    pat_resident:
                      type: string
                      description: indicates if the patient is a resident, Yes / No
                      enum:
                      - Y
                      - N
                      default: Y
                    pat_blood_group:
                      type: string
                      description: patient's blood group
                      enum:
                      - A
                      - B
                      - AB
                      - O
                      default: ""
                    pat_blood_rhesus:
                      type: string
                      description: patient's blood rhesus
                      enum:
                      - "+"
                      - "-"
                      default: ""
                prescriber:
                  type: object
                  properties:
                    prescr_code:
                      type: string
                      description: prescriber's code, if filled in then a match will be found in the database
                      default: ""
                    prescr_title:
                      type: string
                      description: |
                        prescriber's title
                        MA = Madam \
                        SI = Sir \
                        MI = Miss \
                        DO = Doctor \
                        PR = Professor
                      enum:
                      - MA
                      - SI 
                      - MI
                      - DO
                      - PR
                      default: ""
                    prescr_name:
                      type: string
                      description: prescriber's name, name + firstname will be used to search for a match.
                      default: ""
                    prescr_firstname:
                      type: string
                      description: prescriber's firstname, name + firstname will be used to search for a match.
                      default: ""
                    prescr_initial:
                      type: string
                      description: prescriber's initials
                      default: ""
                    prescr_workplace:
                      type: string
                      description: prescriber's work place
                      default: ""
                    prescr_service:
                      type: string
                      description: prescriber's service
                      default: ""
                    prescr_address:
                      type: string
                      description: prescriber's address
                      default: ""
                    prescr_zipcode:
                      type: string
                      description: prescriber's zipcode
                      default: ""
                    prescr_city:
                      type: string
                      description: prescriber's city
                      default: ""
                    prescr_spe:
                      type: string
                      description: |
                        prescriber's speciality \
                        ALL = Allergist \
                        ANDR = Andrologist \
                        ANAT = Anatomopathologist \
                        ANES = Anesthetist \
                        CANC = Cancerlogist \
                        CARD = Cardiologist \
                        SURG = Surgeon \
                        DERM = Dermatologist \
                        ENDO = Endocrinologist \
                        GAST = Gastroenterologist \
                        GENE = Geneticist \
                        GERA = Geriatrician \
                        GYNE = Gynecologist \
                        HEMA = Hematologist \
                        INF = Infectiologist \
                        GEN = General \
                        EMER = Emergency \
                        NUTR = Nutritionist \
                        NEPH = Nephrologist \
                        ONCO = Oncologist \
                        OPHT = Ophthalmologist \
                        OTO = Otorhinolaryngologist \
                        PEDI = Pediatrician \
                        CHPS = Child Psychiatrist \
                        PSY = Psychiatrist \
                        RADIO = Radiologist \
                        RHEU = Rheumatologist \
                        DENT = Dentist \
                        UROL = Urologist \
                        ORTH = Orthopedic \
                        NURS = Nurse \
                        MIDW = Midwife \
                        PULM = Pulmonologist \
                        INT = Internal
                      enum:
                      - ALL    # Allergist
                      - ANDR   # Andrologist
                      - ANAT   # Anatomopathologist
                      - ANES   # Anesthetist
                      - CANC   # Cancerlogist
                      - CARD   # Cardiologist
                      - SURG   # Surgeon
                      - DERM   # Dermatologist
                      - ENDO   # Endocrinologist
                      - GAST   # Gastroenterologist
                      - GENE   # Geneticist
                      - GERA   # Geriatrician
                      - GYNE   # Gynecologist
                      - HEMA   # Hematologist
                      - INF    # Infectiologist
                      - GEN    # General
                      - EMER   # Emergency
                      - NUTR   # Nutritionist
                      - NEPH   # Nephrologist
                      - ONCO   # Oncologist
                      - OPHT   # Ophthalmologist
                      - OTO    # Otorhinolaryngologist
                      - PEDI   # Pediatrician
                      - CHPS   # Child Psychiatrist
                      - PSY    # Psychiatrist
                      - RADIO  # Radiologist
                      - RHEU   # Rheumatologist
                      - DENT   # Dentist
                      - UROL   # Urologist
                      - ORTH   # Orthopedic
                      - NURS   # Nurse
                      - MIDW   # Midwife
                      - PULM   # Pulmonologist
                      - INT    # Internal
                      default: ""
                    prescr_phone:
                      type: string
                      description: prescriber's fix phone number
                      default: ""
                    prescr_mobile:
                      type: string
                      description: prescriber's mobile phone number
                      default: ""
                    prescr_fax:
                      type: string
                      description: prescriber's fax
                      default: ""
                    prescr_email:
                      type: string
                      description: prescriber's email
                      default: ""
                ana_list:
                  type: array
                  items:
                    type: object
                    required: [ana_code]
                    properties:
                      ana_code:
                        type: string
                        description: analysis code
                        example: "B001"
                        default: ""
                      ana_loinc:
                        type: string
                        description: analysis LOINC code
                        example: "14933-6"
                        default: ""
                      ana_emer:
                        type: string
                        description: emergency analysis states, Yes / No.
                        enum:
                        - Y
                        - N
                        default: N
                      ana_req:
                        type: string
                        description: requested analysis states, Yes / No.
                        enum:
                        - Y
                        - N
                        default: Y
                      ana_out:
                        type: string
                        description: outsourced analysis states, Yes / No.
                        enum:
                        - Y
                        - N
                        default: N
                samp_list:
                  type: array
                  items:
                    type: object
                    properties:
                      samp_ana:
                        type: string
                        description: analysis code
                        example: "B001"
                        default: ""
                      samp_date:
                        allOf:
                          - $ref: '#/components/schemas/DateTimeOrEmpty'
                        description: datetime of sampling, (format YYYY-MM-DD HH:MM:SS)
                      samp_date_receipt:
                        allOf:
                          - $ref: '#/components/schemas/DateTimeOrEmpty'
                        description: datetime of receipt sample, (format YYYY-MM-DD HH:MM:SS)
                      samp_type:
                        type: string
                        description: |
                          type of sample \
                          APF  = Alveolar puncture fluid \
                          APFL = Ascites puncture fluid \
                          BAL  = Bronchoalveolar lavage \
                          BIO  = Biopsy \
                          BLD  = Blood \
                          BPF  = Bronchial Puncture Fluid \
                          CSF  = Cerebrospinal fluid \
                          DW   = Drinking water \
                          GS   = Genital swab \
                          JPFL = Joint Puncture Fluid \
                          OTH  = Other \
                          PPF  = Pleural puncture fluid \
                          PS   = Pus sampling \
                          SPUT = Sputum \
                          STL  = Stool \
                          SW   = Surface water \
                          TS   = Throat swab \
                          URN  = Urine \
                          US   = Urethral swab \
                          VS   = Vaginal swab \
                          WW   = Wastewater
                        enum:
                        - APF   # Alveolar puncture fluid
                        - APFL  # Ascites puncture fluid
                        - BAL   # Bronchoalveolar lavage
                        - BIO   # Biopsy
                        - BLD   # Blood
                        - BPF   # Bronchial Puncture Fluid
                        - CSF   # Cerebrospinal fluid
                        - DW    # Drinking water
                        - GS    # Genital swab
                        - JPFL  # Joint Puncture Fluid
                        - OTH   # Other
                        - PPF   # Pleural puncture fluid
                        - PS    # Pus sampling
                        - SPUT  # Sputum
                        - STL   # Stool
                        - SW    # Surface water
                        - TS    # Throat swab
                        - URN   # Urine
                        - US    # Urethral swab
                        - VS    # Vaginal swab
                        - WW    # Wastewater
                        default: ""
                      samp_status:
                        type: string
                        description: |
                          sample status \
                          D = Done \
                          T = To do \
                          P = Provided
                        enum:
                        - D
                        - T
                        - P
                        default: "T"
                      samp_code:
                        type: string
                        description: sample's code
                        default: ""
                      samp_name:
                        type: string
                        description: sampler name
                        default: ""
                      samp_comm:
                        type: string
                        description: comment
                        default: ""
      responses:
        200:
          description: successful operation, return id record created
          content:
            application/json:
              schema:
                type: integer
  /external/patient/list:
    post:
      security: [ { OAuth2: [ external/patient ] } ]
      tags:
      - patient
      summary: List of patient
      operationId: PatientList
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                code: 
                  type: string
                  default: ""
                code_lab: 
                  type: string
                  default: ""
                lastname:
                  type: string
                  default: ""
                firstname:
                  type: string
                  default: ""
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Patient'
  /external/record/list/{id_pres}:
    post:
      security: [ { OAuth2: [ external/record ] } ]
      tags:
      - record
      summary: List of record
      operationId: RecordList
      parameters:
      - name: id_pres
        in: path
        required: true
        description: serial of prescriber. Use 0 to mean "all prescribers".
        schema:
          type: integer
          default: 0
          example: 0
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                num_rec: 
                  type: string
                  default: ""
                stat_work: 
                  type: array
                  items:
                    type: integer
                stat_rec: 
                  type: string
                  description: |
                    Record status \
                    N = New record \
                    A = Administratively validated \
                    IA = Admin. validated intermediate \
                    T = Technically validated \
                    IT = Tech. validated intermediate \
                    B = Biologically validated
                  enum: [N, A, IA, T, IT, B]
                  default: ""
                lastname:
                  type: string
                  default: ""
                firstname:
                  type: string
                  default: ""
                code:
                  type: string
                date_beg:
                  type: string
                  format: date-time
                date_end:
                  type: string
                  format: date-time
                type_ana:
                  type: integer
                code_pat:
                  type: string
                  default: ""
                emer:
                  type: string
                  description: |
                    Emergency filter \
                    Y = Only emergency records \
                    N = All records (emergency and non-emergency)
                  enum: [Y, N]
                  default: "N"
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Record'
  /external/result/{id_rec}:
    get:
      security: [ { OAuth2: [ external/result ] } ]
      tags:
        - result
      summary: Get record results and variables for external usage
      description: >
        Return the list of requested analyses for a record, with their variables,
        current values, units (as label), and possible values if the variable type is a dictionary.
      operationId: ResultFromExtGet
      parameters:
        - name: id_rec
          in: path
          required: true
          description: Record ID
          schema:
            type: integer
      responses:
        200:
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  record_id:
                    type: integer
                    description: ID of the requested record
                  analysis:
                    type: array
                    items:
                      type: object
                      properties:
                        ref_ana:
                          type: string
                          description: Analysis reference code
                        id_ana:
                          type: integer
                          description: Internal ID of the analysis
                        name:
                          type: string
                          description: Analysis name
                        variables:
                          type: array
                          items:
                            type: object
                            properties:
                              id_res:
                                type: integer
                                description: Result ID
                              id_var:
                                type: integer
                                description: Variable ID
                              code_var:
                                type: string
                                description: Technical variable code
                              label:
                                type: string
                                description: Variable label
                              value:
                                type: string
                                description: Current value (label if dictionary)
                              unit:
                                type: string
                                nullable: true
                                description: Unit label
                              possible_values:
                                type: array
                                nullable: true
                                description: List of possible values if variable is dictionary-based
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: integer
                                      description: Dictionary entry ID
                                    label:
                                      type: string
                                      description: Dictionary entry label
        401:
          description: Unauthorized – invalid or missing authentication
        404:
          description: Record not found or access not authorized
    post:
      security: [ { OAuth2: [ external/result ] } ]
      tags:
        - result
      summary: Post analysis results to a record
      description: >
        Accepts a list of result values to update for a given record ID.
      operationId: ResultFromExtPost
      parameters:
        - name: id_rec
          in: path
          required: true
          description: Record ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                list_results:
                  type: array
                  items:
                    type: object
                    properties:
                      id_res:
                        type: integer
                        description: ID of the result to update
                      value:
                        type: string
                        description: New value for the result
      responses:
        200:
          description: All results successfully updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: array
                    items:
                      type: string
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        id_res:
                          type: integer
                        error:
                          type: string
        207:
          description: Partial success – some results updated, some failed
        400:
          description: Missing or invalid parameters
        401:
          description: Unauthorized – invalid or missing authentication
        500:
          description: Internal error during update
  /external/user/list:
    post:
      security: [ { OAuth2: [ external/user ] } ]
      tags:
      - user
      summary: List of user
      operationId: UserList
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  description: |
                    Status of the user \
                    A = Active \
                    D = Deleted \
                    I = Inactive
                  enum:
                  - A
                  - D
                  - I
                login: 
                  type: string
                  default: ""
                lastname:
                  type: string
                  default: ""
                firstname:
                  type: string
                  default: ""
      responses:
        200:
          description: successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: "{{ request.url_root }}/services/oauth/authorize"
          tokenUrl: "{{ request.url_root }}/services/oauth/token"
          scopes:
            external: "Endpoints /external/*" 
            external/analysis: "Endpoints /external/analysis/*"
            external/patient: "Endpoints /external/patient/*"
            external/record: "Endpoints /external/record/*"
            external/result: "Endpoints /external/result/*"
            external/user: "Endpoints /external/user/*"
  schemas:
    Analysis:
      type: object
      properties:
        id_data:
          type: integer
        id_owner:
          type: integer
        code:
          type: string
        nom:
          type: string
        abbr:
          type: string
        famille:
          type: string
        cote_unite:
          type: string
        cote_valeur:
          type: integer
        commentaire:
          type: string
        produit_biologique:
          type: integer
        type_prel:
          type: integer
        type_analyse:
          type: integer
        actif:
          type: integer
        ana_whonet:
          type: integer
    Patient:
      type: object
      properties:
        id_data:      { type: integer }
        id_owner:     { type: integer }
        code:         { type: string }
        code_lab:     { type: string }
        lastname:     { type: string }
        firstname:    { type: string }
        maidenname:   { type: string }
        birth:        { type: string }
        sex:
          type: string
          enum: [M, F, U]
        phone1:       { type: string }
        phone2:       { type: string }
        email:        { type: string, format: email }
        address:      { type: string }
        zipcode:      { type: string }
        city:         { type: string }
        job:          { type: string }
        suburb:       { type: string }
        pbox:         { type: string }
        birth_approx: { type: integer }
        midname:      { type: string }
        resident:     { type: string }
        lite:         { type: string }
        agreement:    { type: string }
    Record:
      type: object
      properties:
        id_data:
          type: integer
        id_owner:
          type: integer
        id_patient:
          type: integer
        type:
          type: integer
        rec_date_receipt:
          type: string
          format: date-time
        num_dos_jour:
          type: string
        num_dos_mois:
          type: string
        num_dos_an:
          type: string
        med_prescripteur:
